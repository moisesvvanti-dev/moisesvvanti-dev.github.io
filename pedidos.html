<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>Kazzi Company | Meus Pedidos</title>
  <link rel="icon" href="/img/logo.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="h-inner container">
    <a href="/" class="h-logo"><img src="/img/logo.png" alt="Kazzi Company"><span class="h-logo-text">KAZZI<em>.</em></span></a>
    <a href="/" style="color:var(--mut2);font-size:13px;font-weight:600;margin-left:auto;">← Voltar à loja</a>
  </div>
</header>

<main class="cart-page container">
  <h1 class="cart-heading">Meus Pedidos</h1>
  <div id="ordersRoot" class="orders-list" style="margin-top:18px;">
    <p class="a-empty">Carregando...</p>
  </div>
</main>

<div class="toast-wrap" id="toastWrap"></div>

<style>
.a-empty{text-align:center;padding:40px;color:var(--mut);font-size:14px}
.orders-list{display:flex;flex-direction:column;gap:14px}
.order-card-cust{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:16px}
.order-card-cust-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.order-card-cust-id{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--off)}
.order-card-cust-status{font-size:10px;font-weight:900;padding:3px 10px;border-radius:99px;text-transform:uppercase;letter-spacing:1px}
.order-card-cust-items{margin-bottom:10px}
.order-item-row{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--bor)}
.order-item-row:last-child{border-bottom:none}
.order-item-row img{width:50px;height:50px;border-radius:6px;object-fit:cover;border:1px solid var(--bor)}
.order-item-info{flex:1}
.order-item-name{font-size:13px;font-weight:700;color:var(--off)}
.order-item-detail{font-size:11px;color:var(--mut)}
.order-item-price{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--ac)}
.order-card-cust-footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--bor)}
.order-card-cust-total{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--ac);letter-spacing:1px}
.order-card-cust-date{font-size:11px;color:var(--mut)}
.tracking-section{margin-top:14px;background:var(--card2);border:1px solid var(--bor);border-radius:10px;padding:14px}
.tracking-section-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;margin-bottom:8px;color:var(--off)}
.tracking-status-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tracking-map-cust{width:100%;height:220px;border-radius:8px;border:1px solid var(--bor);margin-top:8px;overflow:hidden}
.tracking-link{display:inline-block;font-size:12px;color:var(--ac);font-weight:700;margin-top:8px}
</style>

<script>
function fmtP(v) { return 'R$ ' + Number(v||0).toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }

const statusColors = {
  'pago': { bg: '#22c55e22', color: '#22c55e', label: 'Concluído' },
  'cancelado': { bg: '#ef444422', color: '#ef4444', label: 'Cancelado' }
};

function loadOrders() {
  const root = document.getElementById('ordersRoot');
  
  try {
    const orders = JSON.parse(localStorage.getItem('kzc_orders') || '[]');
    
    // Sort orders by most recent
    orders.sort((a, b) => new Date(b.criado) - new Date(a.criado));

    if (!orders.length) {
      root.innerHTML = `
        <div style="text-align:center;padding:60px 20px;">
          <p style="color:var(--mut);font-size:16px;margin-bottom:20px;">Você ainda não fez pedidos neste dispositivo</p>
          <a href="/" class="btn-checkout" style="display:inline-block;padding:14px 32px;">VER PRODUTOS</a>
        </div>`;
      return;
    }

    root.innerHTML = orders.map(o => {
      const sc = statusColors[o.status] || { bg: '#6b728022', color: '#6b7280', label: o.status };
      const data = new Date(o.criado).toLocaleString('pt-BR');

      const itemsHtml = (o.itens || []).map(i => `
        <div class="order-item-row">
          <img src="${i.img || 'https://placehold.co/50x50/111/555?text=?'}" alt="${i.nome}">
          <div class="order-item-info">
            <p class="order-item-name">${i.nome}</p>
            <p class="order-item-detail">Tam: ${i.tam} | Qtd: ${i.qty}</p>
          </div>
          <span class="order-item-price">${fmtP(i.preco * i.qty)}</span>
        </div>
      `).join('');

      return `
        <div class="order-card-cust">
          <div class="order-card-cust-header">
            <span class="order-card-cust-id">PEDIDO #${(o.id || 'N/A').slice(-6).toUpperCase()}</span>
            <span class="order-card-cust-status" style="background:${sc.bg};color:${sc.color};border:1px solid ${sc.color}44;">${sc.label}</span>
          </div>
          <div class="order-card-cust-items">${itemsHtml}</div>
          <div class="order-card-cust-footer">
            <span class="order-card-cust-total">${fmtP(o.total)}</span>
            <span class="order-card-cust-date">${data}</span>
          </div>
          <div class="tracking-section" style="margin-top:14px;">
            <p class="tracking-section-title">📍 FINALIZAÇÃO LOCAL</p>
            <p style="font-size:11px;color:var(--mut);">Os pedidos finalizados sem login ficam salvos apenas neste dispositivo.</p>
          </div>
        </div>
      `;
    }).join('');

  } catch(e) {
    root.innerHTML = `<p class="a-empty" style="color:#f87171;">Erro: ${e.message}</p>`;
  }
}

document.addEventListener('DOMContentLoaded', loadOrders);
</script>
</body>
</html>
