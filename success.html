<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso! | Kazzi Company</title>
    <link rel="stylesheet" crossorigin href="/css/main.css">
    <style>
        body {
            background-color: #0A0A0A;
            color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .success-card {
            background: #141414;
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 500px;
        }
        .icon { font-size: 4rem; margin-bottom: 1rem; display: block; }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { color: #94A3B8; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            background: #E11D48;
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <span class="icon">🔥</span>
        <h1>PEDIDO REALIZADO!</h1>
        <p>Seu pagamento foi processado com sucesso. Em breve enviamos os detalhes do rastreio para o seu email.</p>
        <a href="/" class="btn">VOLTAR PARA A LOJA</a>
    </div>
</body>
</html>
