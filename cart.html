<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/img/logo_kazzi_official_1772658596931.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kazzi Company | Carrinho</title>
  <link rel="stylesheet" crossorigin href="/css/main.css">
  <style>
    :root {
      --bg-dark: #0A0A0A;
      --card-bg: #141414;
      --accent: #E11D48;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
      --radius: 12px;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding-top: 80px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .cart-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.025em;
    }

    .cart-grid {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 2rem;
    }

    @media (max-width: 900px) {
      .cart-grid {
        grid-template-columns: 1fr;
      }
    }

    .cart-items {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cart-item {
      display: flex;
      gap: 1.5rem;
      padding: 1.5rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-item-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .cart-item-meta {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }

    .cart-item-price {
      font-weight: 700;
      color: var(--accent);
    }

    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .quantity-selector {
      display: flex;
      align-items: center;
      background: #1F2937;
      border-radius: 6px;
      padding: 2px;
    }

    .qty-btn {
      background: none;
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .qty-val {
      padding: 0 10px;
      font-weight: 600;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: underline;
    }

    .cart-summary {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 1.5rem;
      height: fit-content;
      position: sticky;
      top: 100px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .summary-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      color: var(--text-muted);
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text);
    }

    .checkout-btn {
      display: block;
      width: 100%;
      background: var(--accent);
      color: white;
      text-align: center;
      padding: 1rem;
      border-radius: 8px;
      font-weight: 700;
      text-decoration: none;
      margin-top: 2rem;
      transition: opacity 0.2s;
    }

    .checkout-btn:hover {
      opacity: 0.9;
    }

    .empty-cart-msg {
      text-align: center;
      padding: 4rem 2rem;
    }

    .empty-cart-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
    }
  </style>
</head>

<body>
  <!-- ═══ HEADER (Simplified) ═══ -->
  <header class="site-header" style="position: fixed; top: 0; width: 100%; z-index: 100; background: var(--bg-dark); border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
    <div class="container" style="padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;">
      <a href="/" class="header-logo">
        <img src="/img/logo_kazzi_official_1772658596931.png" alt="Kazzi Company" style="height: 40px;" />
      </a>
      <a href="/" style="color: var(--text-muted); text-decoration: none; font-weight: 600;">← Voltar para a Loja</a>
    </div>
  </header>

  <main class="container">
    <div class="cart-header">
      <h1 class="cart-title">Seu Carrinho</h1>
      <span id="cart-count-title" style="color: var(--text-muted);">0 itens</span>
    </div>

    <div id="cart-content" class="cart-grid">
      <!-- Loading state or empty state -->
      <div id="loading-spinner" style="grid-column: 1 / -1; text-align: center; padding: 4rem;">
        <p>Carregando carrinho...</p>
      </div>
    </div>
  </main>

  <script type="module" src="/js/cart.js"></script>
</body>

</html>
