<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="img/logo_kazzi_official_1772658596931.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kazzi Company | Checkout</title>
  <link rel="stylesheet" crossorigin href="css/main.css">
  <style>
    :root {
      --bg-dark: #0A0A0A;
      --card-bg: #141414;
      --accent: #E11D48;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
      --radius: 12px;
      --input-bg: #1F2937;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding-top: 80px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
    }

    .checkout-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 2rem;
    }

    @media (max-width: 900px) {
      .checkout-grid {
        grid-template-columns: 1fr;
      }
    }

    .checkout-section {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    input, select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 0.75rem;
      color: white;
      font-size: 1rem;
    }

    input:focus {
      outline: 2px solid var(--accent);
      border-color: transparent;
    }

    .payment-options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .payment-option {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .payment-option:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .payment-option.active {
      border-color: var(--accent);
      background: rgba(225, 29, 72, 0.1);
    }

    .payment-option input {
      width: auto;
    }

    .order-summary {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 1.5rem;
      height: fit-content;
      position: sticky;
      top: 100px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .summary-item {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .summary-item-img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 4px;
    }

    .summary-item-info {
      flex: 1;
      font-size: 0.9rem;
    }

    .summary-total-row {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: 1rem;
      padding-top: 1rem;
      display: flex;
      justify-content: space-between;
      font-weight: 800;
      font-size: 1.25rem;
    }

    .pay-btn {
      display: block;
      width: 100%;
      background: var(--accent);
      color: white;
      text-align: center;
      padding: 1rem;
      border-radius: 8px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      margin-top: 1.5rem;
      font-size: 1.1rem;
    }

    .pay-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <header class="site-header" style="position: fixed; top: 0; width: 100%; z-index: 100; background: var(--bg-dark); border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
     <div class="container" style="padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;">
      <a href="./" class="header-logo">
        <img src="img/logo_kazzi_official_1772658596931.png" alt="Kazzi Company" style="height: 40px;" />
      </a>
      <a href="/cart.html" style="color: var(--text-muted); text-decoration: none; font-weight: 600;">← Voltar ao Carrinho</a>
    </div>
  </header>

  <main class="container">
    <h1 style="margin-bottom: 2rem;">Checkout</h1>

    <div class="checkout-grid">
      <div class="checkout-form">
        <div class="checkout-section">
          <h2 class="section-title">📍 Entrega</h2>
          <div class="form-grid">
            <div class="form-group full">
              <label>Nome Completo</label>
              <input type="text" id="cust-name" placeholder="Como no documento" />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="cust-email" placeholder="seu@email.com" />
            </div>
            <div class="form-group">
              <label>CPF</label>
              <input type="text" id="cust-cpf" placeholder="000.000.000-00" />
            </div>
            <div class="form-group">
              <label>CEP</label>
              <div style="position: relative;">
                <input type="text" id="cust-cep" placeholder="00000-000" maxlength="9" />
                <span id="cep-loading" style="position: absolute; right: 10px; top: 10px; display: none; font-size: 0.8rem;">⌛</span>
              </div>
            </div>
            <div class="form-group full">
              <label>Endereço</label>
              <input type="text" id="cust-address" placeholder="Rua / Avenida" />
            </div>
            <div class="form-group">
              <label>Número</label>
              <input type="text" id="cust-number" placeholder="123" />
            </div>
            <div class="form-group">
              <label>Bairro</label>
              <input type="text" id="cust-neighborhood" placeholder="Bairro" />
            </div>
            <div class="form-group">
              <label>Cidade</label>
              <input type="text" id="cust-city" placeholder="Cidade" readonly />
            </div>
            <div class="form-group">
              <label>Estado</label>
              <input type="text" id="cust-state" placeholder="UF" readonly />
            </div>
          </div>
        </div>

        <div class="checkout-section">
          <h2 class="section-title">💳 Pagamento</h2>
          <div class="payment-options">
            <label class="payment-option active">
              <input type="radio" name="payment-method" value="stripe" checked />
              <div>
                <strong>Cartão de Crédito / Pix (Stripe)</strong>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Internacional, rápido e seguro</p>
              </div>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment-method" value="pagbank" />
              <div>
                <strong>PagBank</strong>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Cartão, Boleto e Pix</p>
              </div>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment-method" value="mercadopago" />
              <div>
                <strong>Mercado Pago</strong>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Pagamento local e Pix</p>
              </div>
            </label>
             <label class="payment-option">
              <input type="radio" name="payment-method" value="rede" />
              <div>
                <strong>Rede / Itaú</strong>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Direto com a Rede</p>
              </div>
            </label>
          </div>
        </div>
      </div>

      <div class="order-summary">
        <h2 class="summary-title">Resumo da Compra</h2>
        <div id="checkout-summary-items">
          <!-- JS injected -->
        </div>
        <div class="summary-total-row">
          <span>Total</span>
          <span id="checkout-total">R$ 0,00</span>
        </div>
        <button id="btn-pay" class="pay-btn">PAGAR AGORA</button>
        <p style="font-size: 0.75rem; text-align: center; color: var(--text-muted); margin-top: 1rem;">
          🔒 Pagamento 100% Seguro
        </p>
      </div>
    </div>
  </main>

  <script type="module" src="js/checkout.js"></script>
</body>

</html>
